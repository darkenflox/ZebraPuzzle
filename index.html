<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Zebra Puzzle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

html, body {
background-color: #ffffff;
color: #1a1a1a;
margin: 0; padding: 0;
min-height: 100vh;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘IBM Plex Mono’, monospace;
background-color: #ffffff;
padding: 24px 16px 60px;
}

header { text-align: center; margin-bottom: 20px; }
h1 {
font-family: ‘Playfair Display’, serif;
font-weight: 900;
font-size: clamp(1.6rem, 4vw, 2.8rem);
color: #1a1a1a;
letter-spacing: 0.04em;
}
.tagline {
font-size: 0.6rem; color: #666;
letter-spacing: 0.18em; text-transform: uppercase; margin-top: 5px;
}

.ctrl { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:14px; }
button {
font-family: ‘IBM Plex Mono’, monospace;
font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase;
padding: 7px 16px;
border: 1.5px solid #1a1a1a;
background-color: #ffffff;
color: #1a1a1a;
cursor: pointer;
transition: all 0.15s;
}
button:hover { background-color: #1a1a1a; color: #ffffff; }

.leg {
display:flex; gap:18px; flex-wrap:wrap; justify-content:center;
margin-bottom:16px; font-size:0.6rem; color:#555;
}
.li { display:flex; align-items:center; gap:6px; }
.ls {
width:20px; height:20px; border:1.5px solid #bbb;
display:flex; align-items:center; justify-content:center; font-size:0.8rem;
}
.lp { background-color:#e8f5e9; color:#2e7d32; border-color:#2e7d32; font-weight:700; }
.ln { background-color:#fafafa; color:#bbb; }
.le { background-color:#ffffff; }

.banner {
max-width:900px; margin:0 auto 16px; padding:9px 20px;
font-family:‘Playfair Display’,serif; font-style:italic; font-weight:700;
font-size:0.8rem; text-align:center; display:none; border:1.5px solid;
}
.ok  { background-color:#e8f5e9; color:#2e7d32; border-color:#2e7d32; }
.err { background-color:#ffebee; color:#c62828; border-color:#c62828; }
.inf { background-color:#fff8e1; color:#f57f17; border-color:#f57f17; }

.scroll { overflow:auto; }

table.grid {
border-collapse: collapse;
table-layout: fixed;
background-color: #ffffff;
}

/* Dead corner */
.dead {
background-color: #f0f0f0 !important;
border: 1px solid #ccc;
}

/* Column category headers */
th.ch-cat {
font-family:‘Playfair Display’,serif; font-style:italic; font-weight:700;
font-size:0.62rem; letter-spacing:0.06em;
background-color: #f8f8f8;
border: 1px solid #ccc;
text-align:center; padding:3px 2px;
height:24px; width:30px; min-width:30px;
}

/* Column value headers */
th.ch-val {
font-size:0.52rem; color:#555;
background-color: #f8f8f8;
border: 1px solid #ccc;
text-align:center; padding:0 1px;
width:30px; min-width:30px; height:60px; vertical-align:bottom;
}
th.ch-val span {
display:block; writing-mode:vertical-rl;
transform:rotate(180deg); white-space:nowrap;
padding-bottom:4px; line-height:1;
}

/* Row category labels */
td.rl-cat {
font-family:‘Playfair Display’,serif; font-style:italic; font-weight:700;
font-size:0.62rem; letter-spacing:0.06em;
background-color: #f8f8f8;
border: 1px solid #ccc;
text-align:right; padding:0 6px;
width:72px; min-width:72px; white-space:nowrap;
}

/* Row value labels */
td.rl-val {
font-size:0.55rem; color:#555;
background-color: #f8f8f8;
border: 1px solid #ccc;
text-align:right; padding:0 6px;
width:72px; min-width:72px; white-space:nowrap;
height:30px;
}

/* Data cells */
td.cell {
width:30px; min-width:30px; height:30px;
border: 1px solid #ccc;
cursor:pointer; text-align:center; vertical-align:middle;
font-size:0.9rem; font-weight:700;
position:relative; outline:none; user-select:none;
transition:background-color 0.1s;
background-color: #ffffff;
color: transparent;
}
td.cell:focus { box-shadow:inset 0 0 0 2px #1a1a1a; z-index:2; }

/* Empty */
td.cell.s0 { background-color:#ffffff; color:transparent; }
td.cell.s0:hover { background-color:#f5f5f5; }

/* Confirmed YES — green check */
td.cell.s1 { background-color:#e8f5e9; color:#2e7d32; }
td.cell.s1:hover { background-color:#c8e6c9; }

/* Eliminated — X mark */

td.cell.sm1 { 
  background-color:#e0e0e0;   /* darker background */
  color:#666;                 /* darker text */
}

td.cell.sm1:hover { 
  background-color:#d5d5d5;   /* slightly darker on hover */
}

td.cell.sm1::after {
  content:'✕';
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#666;                 /* darker X */
  font-size:0.75rem;
  pointer-events:none;
}

/* Dead zone (same-category diagonal blocks) */
td.cell.dz {
background-color: #eeeeee !important;
cursor:default; pointer-events:none;
}
td.cell.dz::after { display:none; }

/* Category boundary lines */
.bdr-l { border-left:  2px solid #888 !important; }
.bdr-t { border-top:   2px solid #888 !important; }

/* Per-category accent colors — row/col labels and header borders */
/* 0 Nationality: indigo */
.cc0   { color:#3949ab !important; border-right:2px solid #3949ab !important; border-bottom:2px solid #3949ab !important; }
.cc0-l { border-left-color:#3949ab !important; border-left-width:2px !important; }
.cc0-t { border-top-color:#3949ab !important;  border-top-width:2px !important; }
/* 1 Color: teal */
.cc1   { color:#00796b !important; border-right:2px solid #00796b !important; border-bottom:2px solid #00796b !important; }
.cc1-l { border-left-color:#00796b !important; border-left-width:2px !important; }
.cc1-t { border-top-color:#00796b !important;  border-top-width:2px !important; }
/* 2 Drink: purple */
.cc2   { color:#6a1b9a !important; border-right:2px solid #6a1b9a !important; border-bottom:2px solid #6a1b9a !important; }
.cc2-l { border-left-color:#6a1b9a !important; border-left-width:2px !important; }
.cc2-t { border-top-color:#6a1b9a !important;  border-top-width:2px !important; }
/* 3 Footwear: brown */
.cc3   { color:#4e342e !important; border-right:2px solid #4e342e !important; border-bottom:2px solid #4e342e !important; }
.cc3-l { border-left-color:#4e342e !important; border-left-width:2px !important; }
.cc3-t { border-top-color:#4e342e !important;  border-top-width:2px !important; }
/* 4 Pet: rose */
.cc4   { color:#ad1457 !important; border-right:2px solid #ad1457 !important; border-bottom:2px solid #ad1457 !important; }
.cc4-l { border-left-color:#ad1457 !important; border-left-width:2px !important; }
.cc4-t { border-top-color:#ad1457 !important;  border-top-width:2px !important; }

/* Clues */
.clues { max-width:780px; margin:28px auto 0; }
.clues h2 {
font-family:‘Playfair Display’,serif; font-size:0.85rem;
color:#1a1a1a; letter-spacing:0.15em; text-transform:uppercase;
border-bottom:2px solid #1a1a1a; padding-bottom:8px; margin-bottom:12px;
}
.cg { display:grid; grid-template-columns:1fr 1fr; gap:3px 28px; }
.cl {
font-size:0.6rem; line-height:1.6; color:#444;
display:flex; gap:7px; padding:3px 0; border-bottom:1px solid #e0e0e0;
}
.cn { color:#888; font-weight:600; min-width:18px; }
</style>

</head>
<body>

<header>
  <h1>The Zebra Puzzle</h1>
  <div class="tagline">Full Cross-Category Logic Grid &nbsp;·&nbsp; 5 Houses &nbsp;·&nbsp; 5 Attributes Each</div>
</header>

<div class="ctrl">
  <button onclick="resetGrid()">Reset All</button>
  <button onclick="checkSolution()">Check Solution</button>
  <button onclick="revealSolution()">Reveal Answer</button>
  <button onclick="clearMarks()">Clear Eliminations</button>
</div>

<div class="leg">
  <div class="li"><div class="ls lp">✓</div>Confirmed</div>
  <div class="li"><div class="ls ln">✕</div>Eliminated</div>
  <div class="li"><div class="ls le"></div>Unknown</div>
  <div class="li" style="color:#999">· click to cycle &nbsp;·&nbsp; +/Y = yes &nbsp;·&nbsp; -/N = no &nbsp;·&nbsp; space = clear ·</div>
</div>

<div class="banner" id="banner"></div>
<div class="scroll"><table class="grid" id="tbl"></table></div>

<div class="clues">
  <h2>Clues</h2>
  <div class="cg" id="cg"></div>
</div>

<script>
const CATS = [
  { name:'Nationality', vals:['Dane','Scot','Greek','Bolivian','Japanese'], c:0 },
  { name:'Color',       vals:['Red','Blue','Ivory','Green','Yellow'],       c:1 },
  { name:'Drink',       vals:['Tea','Coffee','Milk','OJ','Water'],          c:2 },
  { name:'Footwear',    vals:['Loafers','Sneakers','Birkenst.','Slippers','Flip-flops'], c:3 },
  { name:'Pet',         vals:['Dog','Snails','Fox','Horse','Zebra'],        c:4 },
   { name:'House',       vals:['1','2','3','4','5'], c:5 },  // NEW
];
const NC=5, NV=5;

// SOL[house][catIdx] = valIdx
const SOL=[
  [0,4,4,1,2], // H1: Dane,Yellow,Water,Sneakers,Fox
  [3,1,0,2,3], // H2: Bolivian,Blue,Tea,Birkenst,Horse
  [1,0,2,0,1], // H3: Scot,Red,Milk,Loafers,Snails
  [2,2,3,3,0], // H4: Greek,Ivory,OJ,Slippers,Dog
  [4,3,1,4,4], // H5: Japanese,Green,Coffee,Flip-flops,Zebra
];
// SH[ci][vi] = house index for that value
const SH=Array.from({length:NC},(_,ci)=>Array(NV).fill(-1));
for(let h=0;h<NV;h++) for(let ci=0;ci<NC;ci++) SH[ci][SOL[h][ci]]=h;

// st[ci][vi][cj][vj]: 0=unknown, 1=yes, -1=no
let st;
function initState(){
  st=Array.from({length:NC},()=>Array.from({length:NV},()=>
    Array.from({length:NC},()=>Array(NV).fill(0))));
}
function gst(ci,vi,cj,vj){ return st[ci][vi][cj][vj]; }
function sst(ci,vi,cj,vj,v){ st[ci][vi][cj][vj]=v; st[cj][vj][ci][vi]=v; }

function buildTable(){
  const tbl=document.getElementById('tbl');
  tbl.innerHTML='';

  // Header row A: dead corner + category name headers
  const rA=tbl.insertRow();
  const corner=document.createElement('td');
  corner.rowSpan=2; corner.colSpan=2; corner.className='dead';
  rA.appendChild(corner);

  CATS.forEach((cat,cj)=>{
    const th=document.createElement('th');
    th.colSpan=NV;
    th.className='ch-cat cc'+cat.c;
    th.textContent=cat.name;
    rA.appendChild(th);
  });

  // Header row B: individual value headers (rotated text)
  const rB=tbl.insertRow();
  CATS.forEach((cat,cj)=>{
    cat.vals.forEach((v,vj)=>{
      const th=document.createElement('th');
      th.className='ch-val cc'+cj+'-l'+(vj===0?' bdr-l':'');
      th.innerHTML=`<span>${v}</span>`;
      rB.appendChild(th);
    });
  });

  // Data rows
  CATS.forEach((rowCat,ci)=>{
    rowCat.vals.forEach((val,vi)=>{
      const row=tbl.insertRow();

      // Category label (rowspans all NV rows)
      if(vi===0){
        const td=document.createElement('td');
        td.rowSpan=NV;
        td.className='rl-cat cc'+ci;
        td.textContent=rowCat.name;
        row.appendChild(td);
      }

      // Value label
      const vTd=document.createElement('td');
      vTd.className='rl-val cc'+ci+'-t'+(vi===0?' bdr-t':'');
      vTd.textContent=val;
      row.appendChild(vTd);

      // Data cells
      CATS.forEach((colCat,cj)=>{
        colCat.vals.forEach((_,vj)=>{
          const td=document.createElement('td');
          const same=(ci===cj);
          td.className='cell'+(same?' dz':' s0')
            +(vj===0?' bdr-l cc'+cj+'-l':'')
            +(vi===0?' bdr-t cc'+ci+'-t':'');
          if(!same){
            td.tabIndex=0;
            td.dataset.ci=ci; td.dataset.vi=vi;
            td.dataset.cj=cj; td.dataset.vj=vj;
            td.addEventListener('click',()=>cycleCell(ci,vi,cj,vj));
            td.addEventListener('keydown',e=>keyCell(e,ci,vi,cj,vj));
          }
          row.appendChild(td);
        });
      });
    });
  });
}

function renderCell(ci,vi,cj,vj){
  const v=gst(ci,vi,cj,vj);
  const cls=v===1?'s1':v===-1?'sm1':'s0';
  // render both mirrored cells
  for(const [a,b,c,d] of [[ci,vi,cj,vj],[cj,vj,ci,vi]]){
    const td=document.querySelector(`td.cell[data-ci="${a}"][data-vi="${b}"][data-cj="${c}"][data-vj="${d}"]`);
    if(!td) continue;
    td.classList.remove('s0','s1','sm1');
    td.classList.add(cls);
    td.textContent = v===1 ? '✓' : '';
  }
}
function renderAll(){
  for(let ci=0;ci<NC;ci++) for(let vi=0;vi<NV;vi++)
    for(let cj=ci+1;cj<NC;cj++) for(let vj=0;vj<NV;vj++)
      renderCell(ci,vi,cj,vj);
}

function cycleCell(ci,vi,cj,vj){
  const cur=gst(ci,vi,cj,vj);
  if(cur===0) setYes(ci,vi,cj,vj);
  else if(cur===1){ sst(ci,vi,cj,vj,-1); renderCell(ci,vi,cj,vj); }
  else { sst(ci,vi,cj,vj,0); renderCell(ci,vi,cj,vj); }
}

function keyCell(e,ci,vi,cj,vj){
  if(['+','y','Y'].includes(e.key)){ e.preventDefault(); setYes(ci,vi,cj,vj); }
  else if(['-','n','N'].includes(e.key)){ e.preventDefault(); sst(ci,vi,cj,vj,-1); renderCell(ci,vi,cj,vj); }
  else if([' ','Backspace','Delete'].includes(e.key)){ e.preventDefault(); sst(ci,vi,cj,vj,0); renderCell(ci,vi,cj,vj); }
}

function setYes(ci,vi,cj,vj){
  // Mark this pair confirmed
  sst(ci,vi,cj,vj,1);

  // ── KEY CHANGE: eliminate across ALL category pairs, not just this block ──

  // 1. Within the (ci,cj) block: eliminate other col-vals for this row-val,
  //    and other row-vals for this col-val
  for(let v=0;v<NV;v++){
    if(v!==vj && gst(ci,vi,cj,v)!==1) sst(ci,vi,cj,v,-1);
    if(v!==vi && gst(ci,v,cj,vj)!==1) sst(ci,v,cj,vj,-1);
  }

  // 2. Propagate through ALL other category pairs:
  //    If Dane=Yes with Tea, then for every other category ck:
  //      - the val that Dane is confirmed with in (ci,ck) should also be confirmed with Tea in (cj,ck)
  //    More simply: eliminate any (ck,vk) from ci's row-val vi IF that (ck,vk) is already
  //    confirmed-NO with cj's col-val vj, and vice versa.
  //
  //    Actually the cleanest propagation: for every other cat ck,
  //    eliminate other row-vals of ci from pairing with vj's confirmed partners,
  //    and eliminate other col-vals of cj from pairing with vi's confirmed partners.
  for(let ck=0;ck<NC;ck++){
    if(ck===ci || ck===cj) continue;
    // For every vk in ck:
    // If ci[vi] confirmed YES with cj[vj], then:
    //   - any vk that ci[vi] says YES to, cj[vj] must also say YES to (and vice versa)
    //   - any vk that ci[vi] says NO to, cj[vj] must also say NO to (and vice versa)
    for(let vk=0;vk<NV;vk++){
      // If ci[vi] is NO with ck[vk], then cj[vj] must also be NO with ck[vk]
      if(gst(ci,vi,ck,vk)===-1 && gst(cj,vj,ck,vk)!==1) sst(cj,vj,ck,vk,-1);
      // If cj[vj] is NO with ck[vk], then ci[vi] must also be NO with ck[vk]
      if(gst(cj,vj,ck,vk)===-1 && gst(ci,vi,ck,vk)!==1) sst(ci,vi,ck,vk,-1);
      // If ci[vi] is YES with ck[vk], then cj[vj] must be YES with ck[vk] too
      if(gst(ci,vi,ck,vk)===1 && gst(cj,vj,ck,vk)!==1) sst(cj,vj,ck,vk,1);
      // If cj[vj] is YES with ck[vk], then ci[vi] must be YES with ck[vk] too
      if(gst(cj,vj,ck,vk)===1 && gst(ci,vi,ck,vk)!==1) sst(ci,vi,ck,vk,1);
    }
    // Also: eliminate other vals of ci in ck if they conflict,
    // and other vals of cj in ck
    for(let v=0;v<NV;v++){
      // other vals of ci's row should not pair with vj's confirmed ck partners
      if(v!==vi){
        for(let vk=0;vk<NV;vk++){
          if(gst(cj,vj,ck,vk)===1 && gst(ci,v,ck,vk)!==1) sst(ci,v,ck,vk,-1);
        }
      }
      if(v!==vj){
        for(let vk=0;vk<NV;vk++){
          if(gst(ci,vi,ck,vk)===1 && gst(cj,v,ck,vk)!==1) sst(cj,v,ck,vk,-1);
        }
      }
    }
  }

  renderAll();
}

function resetGrid(){ initState(); renderAll(); hideBanner(); }

function clearMarks(){
  for(let ci=0;ci<NC;ci++) for(let vi=0;vi<NV;vi++)
    for(let cj=0;cj<NC;cj++) for(let vj=0;vj<NV;vj++)
      if(st[ci][vi][cj][vj]===-1) st[ci][vi][cj][vj]=0;
  renderAll();
}

function checkSolution(){
  let ok=true, any=false;
  for(let ci=0;ci<NC;ci++) for(let vi=0;vi<NV;vi++)
    for(let cj=ci+1;cj<NC;cj++) for(let vj=0;vj<NV;vj++)
      if(gst(ci,vi,cj,vj)===1){
        any=true;
        if(SH[ci][vi]!==SH[cj][vj]) ok=false;
      }
  if(!any) return showBanner('inf','No entries yet — start solving!');
  showBanner(ok?'ok':'err',
    ok ? '✓ All confirmed entries are correct — keep going…'
       : '✗ At least one entry is wrong. Review your deductions.');
}

function revealSolution(){
  initState();
  for(let ci=0;ci<NC;ci++) for(let cj=ci+1;cj<NC;cj++){
    for(let h=0;h<NV;h++) sst(ci,SOL[h][ci],cj,SOL[h][cj],1);
    for(let vi=0;vi<NV;vi++) for(let vj=0;vj<NV;vj++)
      if(gst(ci,vi,cj,vj)===0) sst(ci,vi,cj,vj,-1);
  }
  renderAll();
  showBanner('ok','★ Dane (H1) drinks Water · Japanese (H5) owns the Zebra');
}

function showBanner(type,msg){
  const b=document.getElementById('banner');
  b.className='banner '+type; b.textContent=msg; b.style.display='block';
}
function hideBanner(){ document.getElementById('banner').style.display='none'; }

const CLUES=[
  'There are five houses.',
  'The Scot lives in the red house.',
  'The Greek owns the dog.',
  'Coffee is drunk in the green house.',
  'The Bolivian drinks tea.',
  'The green house is immediately to the right of the ivory house.',
  'The loafer wearer owns snails.',
  'Sneakers are worn in the yellow house.',
  'Milk is drunk in the middle house.',
  'The Dane lives in the first house.',
  'The Birkenstocks wearer lives next to the person with the fox.',
  'Sneakers are worn next to the house where the horse is kept.',
  'The slipper wearer drinks orange juice.',
  'The Japanese wears flip-flops.',
  'The Dane lives next to the blue house.',
];
function buildClues(){
  const cg=document.getElementById('cg');
  CLUES.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='cl';
    d.innerHTML=`<span class="cn">${i+1}.</span>${c}`;
    cg.appendChild(d);
  });
}

initState(); buildTable(); renderAll(); buildClues();
</script>

</body>
</html>
