<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Zebra Puzzle</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

body {
  font-family: 'IBM Plex Mono', monospace;
  background:#fff;
  margin:0;
  padding:24px 16px 60px;
}

header { text-align:center; margin-bottom:20px; }

h1 {
  font-family:'Playfair Display', serif;
  font-weight:900;
  font-size:2rem;
}

.ctrl {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:14px;
}

button {
  font-size:0.6rem;
  padding:7px 16px;
  border:1.5px solid #1a1a1a;
  background:#fff;
  cursor:pointer;
}

button:hover {
  background:#1a1a1a;
  color:#fff;
}

/* Highlight toggle button */
#autoBtn {
  border-color:#2e7d32;
  color:#2e7d32;
}

/* Grid */
table.grid {
  border-collapse:collapse;
}

td, th {
  border:1px solid #ccc;
}

td.cell {
  width:30px;
  height:30px;
  text-align:center;
  cursor:pointer;
  font-weight:700;
}

/* States */
td.cell.s0 { background:#fff; }

td.cell.s1 {
  background:#e8f5e9;
  color:#2e7d32;
}

td.cell.sm1 {
  background:#f5f5f5;
}

td.cell.sm1::after {
  content:'✕';
  color:#444;
  font-weight:700;
}

/* Dead zone */
td.cell.dz {
  background:#eee;
  pointer-events:none;
}

</style>
</head>

<body>

<header>
  <h1>The Zebra Puzzle</h1>
</header>

<div class="ctrl">
  <button onclick="resetGrid()">Reset</button>
  <button id="autoBtn" onclick="toggleAuto()">Auto-Eliminate: ON</button>
</div>

<table class="grid" id="tbl"></table>

<script>
const CATS = [
  { name:'Nationality', vals:['Dane','Scot','Greek','Bolivian','Japanese'] },
  { name:'Color', vals:['Red','Blue','Ivory','Green','Yellow'] },
  { name:'Drink', vals:['Tea','Coffee','Milk','OJ','Water'] },
  { name:'Footwear', vals:['Loafers','Sneakers','Birkenst.','Slippers','Flip-flops'] },
  { name:'Pet', vals:['Dog','Snails','Fox','Horse','Zebra'] },
];

const NC=5, NV=5;

let AUTO = true;

let st;

function initState(){
  st = Array.from({length:NC},()=>Array.from({length:NV},()=>
    Array.from({length:NC},()=>Array(NV).fill(0))
  ));
}

function gst(ci,vi,cj,vj){ return st[ci][vi][cj][vj]; }

function sst(ci,vi,cj,vj,v){
  st[ci][vi][cj][vj]=v;
  st[cj][vj][ci][vi]=v;
}

function toggleAuto(){
  AUTO = !AUTO;
  document.getElementById('autoBtn').textContent =
    'Auto-Eliminate: ' + (AUTO ? 'ON' : 'OFF');
}

function buildTable(){
  const tbl=document.getElementById('tbl');
  tbl.innerHTML='';

  CATS.forEach((rowCat,ci)=>{
    rowCat.vals.forEach((val,vi)=>{
      const row=tbl.insertRow();

      CATS.forEach((colCat,cj)=>{
        colCat.vals.forEach((_,vj)=>{
          const td=document.createElement('td');

          const same = ci===cj;

          td.className = 'cell ' + (same?'dz':'s0');

          if(!same){
            td.dataset.ci=ci;
            td.dataset.vi=vi;
            td.dataset.cj=cj;
            td.dataset.vj=vj;

            td.onclick = ()=>cycleCell(ci,vi,cj,vj);
          }

          row.appendChild(td);
        });
      });
    });
  });
}

function renderCell(ci,vi,cj,vj){
  const val = gst(ci,vi,cj,vj);

  for(const [a,b,c,d] of [[ci,vi,cj,vj],[cj,vj,ci,vi]]){
    const td = document.querySelector(
      `td[data-ci="${a}"][data-vi="${b}"][data-cj="${c}"][data-vj="${d}"]`
    );
    if(!td) continue;

    td.classList.remove('s0','s1','sm1');

    if(val===1){
      td.classList.add('s1');
      td.textContent='✓';
    } else if(val===-1){
      td.classList.add('sm1');
      td.textContent='';
    } else {
      td.classList.add('s0');
      td.textContent='';
    }
  }
}

function renderAll(){
  for(let ci=0;ci<NC;ci++)
    for(let vi=0;vi<NV;vi++)
      for(let cj=ci+1;cj<NC;cj++)
        for(let vj=0;vj<NV;vj++)
          renderCell(ci,vi,cj,vj);
}

function cycleCell(ci,vi,cj,vj){
  const cur = gst(ci,vi,cj,vj);

  if(cur===0){
    if(AUTO){
      setYes(ci,vi,cj,vj);
    } else {
      sst(ci,vi,cj,vj,1);
      renderCell(ci,vi,cj,vj);
    }
  }
  else if(cur===1){
    sst(ci,vi,cj,vj,-1);
    renderCell(ci,vi,cj,vj);
  }
  else{
    sst(ci,vi,cj,vj,0);
    renderCell(ci,vi,cj,vj);
  }
}

function setYes(ci,vi,cj,vj){
  sst(ci,vi,cj,vj,1);

  for(let v=0;v<NV;v++){
    if(v!==vj) sst(ci,vi,cj,v,-1);
    if(v!==vi) sst(ci,v,cj,vj,-1);
  }

  renderAll();
}

function resetGrid(){
  initState();
  renderAll();
}

initState();
buildTable();
renderAll();

</script>

</body>
</html>
